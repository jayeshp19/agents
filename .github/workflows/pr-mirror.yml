name: Mirror Upstream PRs

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours to look back (default 1)'
        required: false
        default: '1'
      close_outdated:
        description: 'Close fork PRs when upstream closes (yes/no)'
        required: false
        default: 'no'
      stealth:
        description: 'Avoid upstream links and references (yes/no)'
        required: false
        default: 'yes'
      open_issue_on_fail:
        description: 'Open a failure issue when mirroring fails (yes/no)'
        required: false
        default: 'no'
      dry_run:
        description: 'Do not push or create/update PRs (yes/no)'
        required: false
        default: 'no'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-mirror-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror-prs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for speed and identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global fetch.parallel 8
          git config --global advice.detachedHead false
        env:
          GIT_LFS_SKIP_SMUDGE: "1"

      - name: Ensure state file
        run: |
          mkdir -p .github
          if [ ! -f .github/pr-mirror-state.json ]; then
            echo '{"last_run": null, "mirrored": {}}' > .github/pr-mirror-state.json
          fi
          cat .github/pr-mirror-state.json

      - name: Mirror upstream PRs (GraphQL)
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional for PRIVATE upstream reads (PAT or App token with repo read):
          # UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const cp = require('child_process');

            // --- shell helpers ---
            function sh(cmd, opts = {}) {
              core.info(`$ ${cmd}`);
              return cp.execSync(cmd, { stdio: 'inherit', ...opts });
            }
            function shQuiet(cmd, opts = {}) { // for secret-bearing commands
              return cp.execSync(cmd, { stdio: 'inherit', ...opts });
            }

            // Mask secrets early
            if (process.env.UPSTREAM_TOKEN) core.setSecret(process.env.UPSTREAM_TOKEN);
            if (process.env.GITHUB_TOKEN)  core.setSecret(process.env.GITHUB_TOKEN);

            // Rate limit info (REST endpoint)
            const { data: rateLimit } = await github.rest.rateLimit.get();
            core.info(`API remaining: ${rateLimit.rate.remaining}/${rateLimit.rate.limit}`);

            // Load state
            let state = { last_run: null, mirrored: {} };
            try { state = JSON.parse(fs.readFileSync('.github/pr-mirror-state.json', 'utf8')); } catch {}

            // Inputs
            const hoursBack       = parseInt(context.payload.inputs?.hours_back || '1', 10);
            const closeOutdated   = (context.payload.inputs?.close_outdated || 'no') === 'yes';
            const stealth         = (context.payload.inputs?.stealth || 'yes') === 'yes';
            const openIssueOnFail = (context.payload.inputs?.open_issue_on_fail || 'no') === 'yes';
            const dryRun          = (context.payload.inputs?.dry_run || 'no') === 'yes';
            const MAX_TO_PROCESS  = 60;

            const now         = new Date();
            const overlapMins = 10; // overlap to avoid missing updates if a run delays
            // Adaptive window: start at last_run, but at most hours_back; and add overlap
            const defaultFrom = new Date(now.getTime() - hoursBack * 3600 * 1000);
            const lastRun     = state.last_run ? new Date(state.last_run) : null;
            let checkFrom     = lastRun ? new Date(Math.min(lastRun.getTime(), defaultFrom.getTime())) : defaultFrom;
            checkFrom = new Date(checkFrom.getTime() - overlapMins * 60 * 1000);

            const repoOwner = context.repo.owner;
            const repoName  = context.repo.repo;

            // Auto-detect upstream (source preferred, else parent)
            const { data: thisRepo } = await github.rest.repos.get({ owner: repoOwner, repo: repoName });
            if (!thisRepo.fork || (!thisRepo.parent && !thisRepo.source)) {
              core.setFailed('This repository is not a fork (no parent/source) — cannot auto-detect upstream.');
              return;
            }
            const upstreamMeta  = thisRepo.source || thisRepo.parent;
            const upstreamOwner = upstreamMeta.owner.login;
            const upstreamRepo  = upstreamMeta.name;
            const upstreamPriv  = !!upstreamMeta.private;

            core.info(`Window: ${checkFrom.toISOString()} → ${now.toISOString()} | close_outdated=${closeOutdated} | stealth=${stealth} | dry_run=${dryRun}`);
            core.info(`Detected upstream: ${upstreamOwner}/${upstreamRepo}${upstreamPriv ? ' (private)' : ''}`);

            // If private upstream, set global git header (needs UPSTREAM_TOKEN)
            if (upstreamPriv && !process.env.UPSTREAM_TOKEN) {
              core.warning('Upstream is private but UPSTREAM_TOKEN is not set; pull refs may fail.');
            }
            if (process.env.UPSTREAM_TOKEN) {
              const header = "AUTHORIZATION: basic " + Buffer.from(`x-access-token:${process.env.UPSTREAM_TOKEN}`).toString('base64');
              shQuiet(`git config --global http.https://github.com/.extraheader "${header}"`);
            }

            // --- GraphQL: list open PRs, newest updated first; stop once out of window ---
            async function listUpdatedPRsGraphQL() {
              const prs = [];
              let cursor = null;
              while (true) {
                const query = `
                  query($owner:String!, $repo:String!, $cursor:String) {
                    repository(owner:$owner, name:$repo) {
                      pullRequests(first: 100, orderBy:{field: UPDATED_AT, direction: DESC}, states: OPEN, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          number
                          title
                          updatedAt
                          createdAt
                          isDraft
                          baseRefName
                          author { login }
                          headRef { name }
                          headRefOid
                          headRepository { cloneUrl }
                          body
                          url
                        }
                      }
                    }
                  }`;
                const data = await github.graphql(query, { owner: upstreamOwner, repo: upstreamRepo, cursor });
                const prConn = data.repository?.pullRequests;
                if (!prConn || !prConn.nodes?.length) break;

                for (const n of prConn.nodes) {
                  const updated = new Date(n.updatedAt);
                  if (updated < checkFrom) return prs; // early exit
                  if (updated <= now) {
                    prs.push({
                      number: n.number,
                      title: n.title,
                      updated_at: n.updatedAt,
                      created_at: n.createdAt,
                      draft: n.isDraft,
                      base: { ref: n.baseRefName },
                      user: { login: n.author?.login || 'unknown' },
                      head: {
                        ref: n.headRef?.name || null,
                        sha: n.headRefOid,
                        repo: { clone_url: n.headRepository?.cloneUrl || null }
                      },
                      body: n.body,
                      html_url: n.url
                    });
                  }
                }
                if (!prConn.pageInfo.hasNextPage) break;
                cursor = prConn.pageInfo.endCursor;
              }
              return prs;
            }

            // --- Stealth sanitizers ---
            function sanitizeBody(src) {
              if (!src) return '*No description provided*';
              let text = src;
              // owner/repo#123 → owner / repo PR 123
              text = text.replace(/\b([A-Za-z0-9_.-]+)\/([A-Za-z0-9_.-]+)#(\d+)\b/g, (_, o, r, n) => `${o} / ${r} PR ${n}`);
              // #123 → PR 123 (avoid headers)
              text = text.replace(/(^|[^A-Za-z0-9_/.-])#(\d+)\b/g, (m, pre, n) => `${pre}PR ${n}`);
              // @user → ＠user (full-width at)
              text = text.replace(/@([A-Za-z0-9-]+)/g, '＠$1');
              // github URLs → hxxps
              text = text.replace(/https?:\/\/github\.com\/\S+/gi, (u) => u.replace(/^https:/i, 'hxxps:').replace(/^http:/i, 'hxxp:'));
              // collapse spaces
              text = text.replace(/ {2,}/g, ' ');
              return text;
            }
            function sanitizeInline(s) {
              if (!s) return '';
              let t = s;
              t = t.replace(/\b([A-Za-z0-9_.-]+)\/([A-Za-z0-9_.-]+)#(\d+)\b/g, (_, o, r, n) => `${o} / ${r} PR ${n}`);
              t = t.replace(/(^|[^A-Za-z0-9_/.-])#(\d+)\b/g, (m, pre, n) => `${pre}PR ${n}`);
              t = t.replace(/@([A-Za-z0-9-]+)/g, '＠$1');
              return t;
            }
            function buildBody(pr, headSha, nowISO, prevSha, upstreamOwner, upstreamRepo, stealth) {
              const safeUser = (u) => `＠${u}`; // FULL-WIDTH @
              const safeRef  = `${upstreamOwner} / ${upstreamRepo} PR ${pr.number}`;
              const safeSHA  = headSha.substring(0, 7);
              const created  = new Date(pr.created_at).toISOString().split('T')[0];
              const updated  = new Date(pr.updated_at).toISOString().split('T')[0];

              const headerTbl =
                `| Field | Value |\n` +
                `| --- | --- |\n` +
                `| Upstream | ${safeRef} |\n` +
                `| Author | ${safeUser(pr.user.login)} |\n` +
                `| Created | ${created} |\n` +
                `| Last Updated | ${updated} |\n` +
                `| Mirrored At | ${nowISO} |\n` +
                `| Commit | \`${safeSHA}\` |\n` +
                `| Status | ${pr.draft ? 'Draft' : 'Ready for review'} |\n`;

              const desc = stealth ? sanitizeBody(pr.body) : (pr.body || '*No description provided*');
              const maybeUpdated = (prevSha && prevSha !== headSha) ? `\n---\nUpdated with new commits at ${nowISO}\n` : '';
              const meta = `<!-- upstream=${upstreamOwner}/${upstreamRepo} PR=${pr.number} sha=${safeSHA} -->`;
              return `## Mirrored from upstream\n\n${headerTbl}\n\n### Original Description${stealth ? ' (sanitized)' : ''}\n\n${desc}\n${maybeUpdated}\n${meta}`;
            }

            // Results
            const results = { created: [], updated: [], planned: [], skipped: [], failed: [], closed: [] };

            try {
              let prs = await listUpdatedPRsGraphQL();
              if (prs.length > MAX_TO_PROCESS) {
                core.warning(`Limiting to first ${MAX_TO_PROCESS} PRs this run (found ${prs.length}).`);
                prs = prs.slice(0, MAX_TO_PROCESS);
              }
              core.info(`Processing ${prs.length} PR(s) from upstream.`);

              // Ensure labels exist (namespaced)
              async function ensureLabel(name, color) {
                try { await github.rest.issues.getLabel({ owner: repoOwner, repo: repoName, name }); }
                catch {
                  try { await github.rest.issues.createLabel({ owner: repoOwner, repo: repoName, name, color }); }
                  catch (e) { core.warning(`Could not create label ${name}: ${e.message}`); }
                }
              }
              await ensureLabel('mirror/upstream', '1d76db');

              for (const pr of prs) {
                try {
                  const number  = pr.number;
                  const headSha = pr.head.sha;
                  const prev    = state.mirrored[number];

                  if (prev && prev.head_sha === headSha) {
                    results.skipped.push(`PR #${number} - no new commits`);
                    continue;
                  }

                  const branchName      = `upstream-pr-${number}`;
                  const upstreamBaseRef = pr.base.ref;

                  // Fetch via pull/<n>/head
                  let fetched = false;
                  try {
                    core.startGroup(`Fetch #${number}`);
                    if (!dryRun) {
                      sh(`git fetch --no-tags --depth=1 https://github.com/${upstreamOwner}/${upstreamRepo}.git pull/${number}/head:${branchName}`);
                    } else {
                      core.info(`[dry-run] would fetch pull/${number}/head -> ${branchName}`);
                    }
                    fetched = true;
                  } catch (e) {
                    core.warning(`Direct pull ref failed for #${number}: ${e.message}`);
                  } finally {
                    core.endGroup();
                  }

                  // Fallback: clone head repo/branch
                  if (!fetched) {
                    const headRepo = pr.head.repo?.clone_url;
                    const headRef  = pr.head.ref;
                    if (!headRepo || !headRef) {
                      results.failed.push(`PR #${number} - missing head repo/ref`);
                      continue;
                    }
                    core.startGroup(`Fallback clone #${number}`);
                    try {
                      if (!dryRun) {
                        sh(`rm -rf mirrortmp || true`);
                        sh(`git clone --no-tags --filter=blob:none --depth=1 --branch ${headRef} ${headRepo} mirrortmp`);
                        const ghToken = process.env.GITHUB_TOKEN;
                        if (ghToken) {
                          const header = "AUTHORIZATION: basic " + Buffer.from(`x-access-token:${ghToken}`).toString('base64');
                          shQuiet(`git -C mirrortmp config http.https://github.com/.extraheader "${header}"`);
                        }
                        sh(`git -C mirrortmp push https://github.com/${repoOwner}/${repoName}.git HEAD:${branchName} --force --no-verify`);
                        try { shQuiet(`git -C mirrortmp config --unset-all http.https://github.com/.extraheader`); } catch {}
                        sh(`rm -rf mirrortmp || true`);
                      } else {
                        core.info(`[dry-run] would clone ${headRepo}#${headRef} and push -> ${branchName}`);
                      }
                    } finally {
                      core.endGroup();
                    }
                  } else {
                    if (!dryRun) {
                      sh(`git push --no-verify origin ${branchName} --force`);
                    } else {
                      core.info(`[dry-run] would push branch ${branchName}`);
                    }
                  }

                  // Base branch fallback to fork default
                  let baseRef = upstreamBaseRef;
                  try {
                    await github.rest.repos.getBranch({ owner: repoOwner, repo: repoName, branch: baseRef });
                  } catch {
                    const forkMeta = await github.rest.repos.get({ owner: repoOwner, repo: repoName });
                    baseRef = forkMeta.data.default_branch || 'main';
                    core.warning(`Base '${upstreamBaseRef}' not found in fork. Using '${baseRef}'`);
                  }

                  // Existing PR?
                  const existing = await github.rest.pulls.list({
                    owner: repoOwner, repo: repoName, state: 'open', head: `${repoOwner}:${branchName}`,
                  });

                  const nowISO = now.toISOString();
                  const body   = buildBody(pr, headSha, nowISO, prev?.head_sha, upstreamOwner, upstreamRepo, stealth);

                  let forkPRUrl, forkPRNumber;
                  if (existing.data.length > 0) {
                    forkPRUrl    = existing.data[0].html_url;
                    forkPRNumber = existing.data[0].number;

                    if (!prev || prev.head_sha !== headSha) {
                      if (!dryRun) {
                        await github.rest.pulls.update({ owner: repoOwner, repo: repoName, pull_number: forkPRNumber, body });
                        results.updated.push(`PR #${number} → ${forkPRUrl} (new commits)`);
                      } else {
                        results.planned.push(`PR #${number} would update body of existing fork PR #${forkPRNumber}`);
                      }
                    } else {
                      results.skipped.push(`PR #${number} - already mirrored`);
                    }
                  } else {
                    if (!dryRun) {
                      const created = await github.rest.pulls.create({
                        owner: repoOwner, repo: repoName,
                        title: `[Upstream PR ${number}] ${stealth ? sanitizeInline(pr.title) : pr.title}`,
                        body, head: branchName, base: baseRef, draft: true
                      });
                      forkPRUrl    = created.data.html_url;
                      forkPRNumber = created.data.number;
                      results.created.push(`PR #${number} → ${forkPRUrl}`);

                      // Labels (namespaced)
                      async function ensureLabel(name, color) {
                        try { await github.rest.issues.getLabel({ owner: repoOwner, repo: repoName, name }); }
                        catch { try { await github.rest.issues.createLabel({ owner: repoOwner, repo: repoName, name, color }); } catch {} }
                      }
                      try {
                        await github.rest.issues.addLabels({
                          owner: repoOwner, repo: repoName, issue_number: forkPRNumber,
                          labels: ['mirror/upstream', `mirror/pr-${number}`]
                        });
                      } catch {
                        await ensureLabel(`mirror/pr-${number}`, 'fbca04');
                        try {
                          await github.rest.issues.addLabels({
                            owner: repoOwner, repo: repoName, issue_number: forkPRNumber,
                            labels: ['mirror/upstream', `mirror/pr-${number}`]
                          });
                        } catch {}
                      }
                    } else {
                      results.planned.push(`PR #${number} would create fork PR (base=${baseRef}, head=${branchName})`);
                    }
                  }

                  // Update state
                  state.mirrored[number] = {
                    head_sha: headSha, branch: branchName, base: baseRef,
                    fork_pr_url: forkPRUrl || null, fork_pr_number: forkPRNumber || null,
                    last_updated: now.toISOString(),
                    upstream_title: pr.title, upstream_author: pr.user.login
                  };

                } catch (err) {
                  results.failed.push(`PR #${pr.number}: ${err.message}`);
                }
              }

              // Close mirrored PRs whose upstream is closed (stealth comment)
              if (closeOutdated) {
                const mirroredNumbers = Object.keys(state.mirrored);
                for (const num of mirroredNumbers) {
                  try {
                    const upstream = await github.rest.pulls.get({
                      owner: upstreamOwner, repo: upstreamRepo, pull_number: parseInt(num, 10)
                    });
                    if (upstream.data.state === 'closed') {
                      const info = state.mirrored[num];
                      if (info?.fork_pr_number) {
                        const forkPR = await github.rest.pulls.get({
                          owner: repoOwner, repo: repoName, pull_number: info.fork_pr_number
                        }).catch(() => null);
                        if (forkPR && forkPR.data.state === 'open') {
                          const statusTxt = upstream.data.merged ? 'merged' : 'closed';
                          if (!dryRun) {
                            await github.rest.issues.createComment({
                              owner: repoOwner, repo: repoName, issue_number: info.fork_pr_number,
                              body: `Auto‑closing mirror. Upstream PR ${num} is ${statusTxt}.`
                            });
                            await github.rest.pulls.update({
                              owner: repoOwner, repo: repoName, pull_number: info.fork_pr_number, state: 'closed'
                            });
                            results.closed.push(`Closed fork PR #${info.fork_pr_number} (upstream ${num} ${statusTxt})`);
                          } else {
                            results.planned.push(`Would close fork PR #${info.fork_pr_number} because upstream ${num} is ${statusTxt}`);
                          }
                        }
                      }
                      delete state.mirrored[num];
                    }
                  } catch (e) {
                    core.warning(`Could not check upstream PR ${num}: ${e.message}`);
                  }
                }
              }

            } catch (outerErr) {
              results.failed.push(`Exception: ${outerErr.message}`);
              core.setFailed(outerErr.message);
            } finally {
              // Save state
              state.last_run = new Date().toISOString();
              fs.writeFileSync('.github/pr-mirror-state.json', JSON.stringify(state, null, 2));
              try {
                if (!dryRun) {
                  sh('git add .github/pr-mirror-state.json');
                  sh(`git commit -m "Update PR mirror state - ${state.last_run}"`);
                  sh('git push');
                } else {
                  core.info('[dry-run] would commit and push updated state file');
                }
              } catch {}

              // Unset global header (cleanup)
              try { shQuiet('git config --global --unset-all http.https://github.com/.extraheader'); } catch {}

              // Build summary
              const lines = [];
              if (results.created.length) lines.push(`### ✅ Created (${results.created.length})`, ...results.created.map(x => `- ${x}`), '');
              if (results.updated.length) lines.push(`### 🔄 Updated (${results.updated.length})`, ...results.updated.map(x => `- ${x}`), '');
              if (results.closed.length)  lines.push(`### 🔒 Closed (${results.closed.length})`,  ...results.closed.map(x => `- ${x}`), '');
              if (results.planned.length) lines.push(`### 🧪 Planned (dry-run) (${results.planned.length})`, ...results.planned.map(x => `- ${x}`), '');
              if (results.failed.length)  lines.push(`### ❌ Failed (${results.failed.length})`,  ...results.failed.map(x => `- ${x}`), '');
              if (results.skipped.length) lines.push(`### ⏭️ Skipped (${results.skipped.length})`, ...results.skipped.map(x => `- ${x}`), '');
              if (!lines.length) lines.push('No PRs needed processing in this time window.');

              await core.summary
                .addHeading('Upstream PR Mirror Report')
                .addRaw(`Upstream: ${upstreamOwner} / ${upstreamRepo}\n`)
                .addRaw(`Time Range: ${checkFrom.toISOString()} → ${new Date().toISOString()}\n`)
                .addRaw(`Rate Limit: ${rateLimit.rate.remaining}/${rateLimit.rate.limit}\n`)
                .addRaw(`Dry Run: ${dryRun}\n\n`)
                .addRaw(lines.join('\n'))
                .write();

              // Optional failure issue
              if (openIssueOnFail && results.failed.length && !dryRun) {
                await github.rest.issues.create({
                  owner: repoOwner, repo: repoName,
                  title: `PR Mirror Failures - ${new Date().toISOString().split('T')[0]}`,
                  body: `## Failures\n\n${results.failed.map(f => `- ${f}`).join('\n')}\n\n[Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                  labels: ['mirror-failure']
                }).catch(() => {});
              }
            }
